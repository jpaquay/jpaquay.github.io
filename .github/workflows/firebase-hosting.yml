name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
      - feature/upgrade-beautiful-jekyll

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll Site
        run: |
          bundle install
          bundle exec jekyll build

      - name: Deploy Live (Master Branch)
        if: github.ref == 'refs/heads/master'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NETDEV_FIREBASE }}'
          channelId: live
          projectId: netdev-firebase
          target: netdev-blog

      - name: Deploy Preview Channel (Feature Branches)
        if: github.ref != 'refs/heads/master'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NETDEV_FIREBASE }}'
          channelId: 'preview-${{ github.sha }}'
          expires: 7d
          projectId: netdev-firebase
          target: netdev-blog
